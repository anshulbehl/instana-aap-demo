---
# Workflow Node 1: AI-assisted alert routing
# Receives Instana alert context, fetches the full job template catalog from AAP,
# calls LLM to select the best remediation template, and passes the decision to
# the next workflow node via set_stats.
#
# This playbook does NOT launch remediation directly. The workflow handles:
#   Node 1: This playbook (AI routing decision)
#   Node 2: Approval node (human reviews the AI choice)
#   Node 3: dispatch_remediation.yml (executes the selected template)
- name: AI-assisted alert routing
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Instana alert payload (passed from EDA as extra_vars)
    alert_text: ""
    alert_severity: ""
    alert_entity: ""
    alert_fqdn: ""
    alert_entity_label: ""
    alert_link: ""
    alert_suggestion: ""

    # LLM configuration (pass via extra_vars)
    llm_api_url: ""
    llm_api_key: ""
    llm_model: "claude-sonnet-4-5"

    # AAP controller connection (pass via extra_vars)
    controller_host: ""
    controller_token: ""

    # Mattermost notification (pass via extra_vars)
    mattermost_instance: ""
    mattermost_token: ""

  tasks:
    - name: Validate alert input
      ansible.builtin.assert:
        that:
          - alert_text | length > 0
        fail_msg: "No alert_text provided. This playbook must be called with Instana alert context."

    - name: Fetch job template catalog from AAP
      ansible.builtin.uri:
        url: "https://{{ controller_host }}/api/controller/v2/job_templates/?page_size=100"
        method: GET
        headers:
          Authorization: "Bearer {{ controller_token }}"
          Content-Type: "application/json"
        validate_certs: false
        status_code: 200
      register: jt_response

    - name: Build template catalog for LLM
      ansible.builtin.set_fact:
        template_catalog: >-
          {% for jt in jt_response.json.results %}
          {{ loop.index }}. {{ jt.name }}
             Description: {{ jt.description | default('No description provided') }}
          {% endfor %}

    - name: Build LLM prompt
      ansible.builtin.set_fact:
        llm_prompt: |
          You are an AIOps routing agent. An observability alert has fired and you must
          select the single best remediation action from the job template catalog below.

          ALERT CONTEXT:
          - Text: {{ alert_text }}
          - Severity: {{ alert_severity }}
          - Entity: {{ alert_entity }}
          - Entity Label: {{ alert_entity_label }}
          - FQDN: {{ alert_fqdn }}
          {% if alert_suggestion | length > 0 %}
          - Instana Suggestion: {{ alert_suggestion }}
          {% endif %}

          JOB TEMPLATE CATALOG (from Ansible Automation Platform):
          {{ template_catalog }}

          INSTRUCTIONS:
          - Select exactly ONE job template from the catalog that best remediates this alert
          - If confidence is below 70% or the alert does not clearly match any template, set template to "ESCALATE"
          - Respond with ONLY a JSON object in this exact format, no other text:
          {"template": "<exact template name>", "confidence": <0-100>, "reasoning": "<one sentence>"}

    - name: Call LLM for routing decision
      ansible.builtin.uri:
        url: "{{ llm_api_url }}"
        method: POST
        headers:
          Authorization: "Bearer {{ llm_api_key }}"
          Content-Type: "application/json"
        body_format: json
        body:
          model: "{{ llm_model }}"
          messages:
            - role: user
              content: "{{ llm_prompt }}"
          temperature: 0.1
          max_tokens: 200
        status_code: 200
      register: llm_response

    - name: Parse LLM response
      ansible.builtin.set_fact:
        routing_decision: "{{ llm_response.json.choices[0].message.content | regex_replace('(?s)```(?:json)?\\s*', '') | regex_replace('(?s)```\\s*$', '') | trim }}"

    - name: Display routing decision
      ansible.builtin.debug:
        msg:
          - "AI selected: {{ routing_decision.template }}"
          - "Confidence: {{ routing_decision.confidence }}%"
          - "Reasoning: {{ routing_decision.reasoning }}"

    - name: Notify Mattermost with AI routing decision
      community.general.mattermost:
        url: "{{ mattermost_instance }}"
        api_key: "{{ mattermost_token }}"
        attachments:
          - text: "AIOps Remediation - Approval Required"
            color: "{{ '#ff6600' if routing_decision.confidence | int < 80 else '#00cc44' }}"
            title: "Instana Alert: {{ alert_text }}"
            fields:
              - title: Alert Details
                value: |
                  Entity: {{ alert_entity_label }}
                  Severity: {{ alert_severity }}
                  FQDN: {{ alert_fqdn }}
                  Suggestion: {{ alert_suggestion | default('N/A') }}
                short: false
              - title: AI Routing Decision
                value: |
                  Selected Template: {{ routing_decision.template }}
                  Confidence: {{ routing_decision.confidence }}%
                  Reasoning: {{ routing_decision.reasoning }}
                short: false
              - title: Action Required
                value: "Approve or deny this remediation in [AAP Workflow Approvals](https://{{ controller_host }}/#/workflow_approvals)"
                short: false
              - title: Instana Link
                value: "{{ alert_link }}"
                short: false
      delegate_to: localhost
      when: mattermost_instance | default('') | trim != ''

    - name: Pass routing decision to workflow via set_stats
      ansible.builtin.set_stats:
        data:
          selected_template: "{{ routing_decision.template }}"
          routing_confidence: "{{ routing_decision.confidence }}"
          routing_reasoning: "{{ routing_decision.reasoning }}"
          alert_text: "{{ alert_text }}"
          alert_severity: "{{ alert_severity }}"
          alert_entity: "{{ alert_entity }}"
          alert_fqdn: "{{ alert_fqdn }}"
          alert_entity_label: "{{ alert_entity_label }}"
          alert_link: "{{ alert_link }}"

    - name: Fail the node if AI says ESCALATE
      ansible.builtin.fail:
        msg: >-
          AI router selected ESCALATE (confidence: {{ routing_decision.confidence }}%).
          Alert '{{ alert_text }}' does not match any known remediation.
          Sending to on-call team for manual investigation.
      when: routing_decision.template == "ESCALATE"
