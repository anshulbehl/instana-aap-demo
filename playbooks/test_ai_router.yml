---
# Test the AI routing logic locally without EDA or Instana
# Simulates different alert types and shows which template the AI picks
#
# Usage:
#   ansible-playbook playbooks/test_ai_router.yml -e test_scenario=latency
#   ansible-playbook playbooks/test_ai_router.yml -e test_scenario=database
#   ansible-playbook playbooks/test_ai_router.yml -e test_scenario=deployment
#   ansible-playbook playbooks/test_ai_router.yml -e test_scenario=unknown
- name: Test AI routing with simulated alerts
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    test_scenario: "latency"

    # LLM configuration
    llm_api_url: "{{ lookup('env', 'LLM_API_URL') }}"
    llm_api_key: "{{ lookup('env', 'LLM_API_KEY') }}"
    llm_model: "{{ lookup('env', 'LLM_MODEL') | default('ibm/granite-3-8b-instruct', true) }}"

    # Simulated alert scenarios
    scenarios:
      latency:
        alert_text: "Calls are slower or equal to 2000 ms based on latency (90th)"
        alert_severity: "10"
        alert_entity: "python"
        alert_fqdn: "ip-10-99-1-148.ec2.internal"
        alert_entity_label: "demo-app.py"
        alert_link: "https://instana.example.com/events/123"
        alert_suggestion: "Service response time has exceeded normal thresholds"
      database:
        alert_text: "MySQL query execution time exceeded threshold - slow queries detected on production database"
        alert_severity: "5"
        alert_entity: "mysql"
        alert_fqdn: "db-prod-01.internal"
        alert_entity_label: "mysql-production"
        alert_link: "https://instana.example.com/events/456"
        alert_suggestion: "Connection pool may be exhausted, consider recycling idle connections"
      deployment:
        alert_text: "Erroneous call rate spike detected - 45% error rate on checkout-service after recent deployment"
        alert_severity: "10"
        alert_entity: "kubernetes-pod"
        alert_fqdn: "checkout-service-7d4b8c6f9-x2k4m"
        alert_entity_label: "checkout-service"
        alert_link: "https://instana.example.com/events/789"
        alert_suggestion: "Error spike correlates with deployment change 12 minutes ago"
      unknown:
        alert_text: "Disk I/O latency on /dev/sda1 exceeding 500ms - filesystem performance degraded"
        alert_severity: "7"
        alert_entity: "host"
        alert_fqdn: "storage-node-03.internal"
        alert_entity_label: "storage-node-03"
        alert_link: "https://instana.example.com/events/999"
        alert_suggestion: ""

    # Same catalog as the real router
    remediation_catalog:
      - name: "Instana - Service Latency Remediation"
        description: >-
          Restarts a systemd-managed application service to clear thread pool
          exhaustion or memory leaks causing high response times. Verifies
          health check post-restart and posts annotation to Instana.
        indicators:
          - high latency
          - slow response time
          - thread pool exhaustion
          - service degradation

      - name: "Instana - Database Performance Remediation"
        description: >-
          Kills idle database connections exceeding threshold, clears query
          cache, and recycles connection pool. For MySQL and PostgreSQL.
        indicators:
          - slow queries
          - connection pool exhaustion
          - database performance degradation
          - high db response time

      - name: "Instana - Deployment Rollback"
        description: >-
          Rolls back the most recent Kubernetes or application deployment
          when error rate spikes correlate with a recent change event.
          High impact - requires approval in production.
        indicators:
          - error rate spike
          - erroneous calls
          - deployment failure
          - recent change correlation

      - name: "ESCALATE"
        description: >-
          No suitable automated remediation found. Escalate to on-call
          engineer via notification. Use when the alert does not match
          any known remediation pattern or when confidence is low.
        indicators:
          - unknown failure mode
          - novel alert pattern
          - multiple possible causes

  tasks:
    - name: Set active scenario
      ansible.builtin.set_fact:
        alert: "{{ scenarios[test_scenario] }}"

    - name: Display test scenario
      ansible.builtin.debug:
        msg:
          - "--- Test Scenario: {{ test_scenario }} ---"
          - "Alert: {{ alert.alert_text }}"
          - "Entity: {{ alert.alert_entity }} ({{ alert.alert_entity_label }})"
          - "Severity: {{ alert.alert_severity }}"

    - name: Build LLM prompt
      ansible.builtin.set_fact:
        llm_prompt: |
          You are an AIOps routing agent. An observability alert has fired and you must
          select the single best remediation action from the catalog below.

          ALERT CONTEXT:
          - Text: {{ alert.alert_text }}
          - Severity: {{ alert.alert_severity }}
          - Entity: {{ alert.alert_entity }}
          - Entity Label: {{ alert.alert_entity_label }}
          - FQDN: {{ alert.alert_fqdn }}
          {% if alert.alert_suggestion | length > 0 %}
          - Instana Suggestion: {{ alert.alert_suggestion }}
          {% endif %}

          REMEDIATION CATALOG:
          {% for template in remediation_catalog %}
          {{ loop.index }}. {{ template.name }}
             Description: {{ template.description }}
             Indicators: {{ template.indicators | join(', ') }}
          {% endfor %}

          INSTRUCTIONS:
          - Select exactly ONE template from the catalog
          - If confidence is below 70% or the alert does not clearly match any template, select ESCALATE
          - Respond with ONLY a JSON object in this exact format, no other text:
          {"template": "<exact template name>", "confidence": <0-100>, "reasoning": "<one sentence>"}

    - name: Call LLM for routing decision
      ansible.builtin.uri:
        url: "{{ llm_api_url }}"
        method: POST
        headers:
          Authorization: "Bearer {{ llm_api_key }}"
          Content-Type: "application/json"
        body_format: json
        body:
          model: "{{ llm_model }}"
          messages:
            - role: user
              content: "{{ llm_prompt }}"
          temperature: 0.1
          max_tokens: 200
        status_code: 200
      register: llm_response

    - name: Parse LLM response
      ansible.builtin.set_fact:
        routing_decision: "{{ llm_response.json.choices[0].message.content | from_json }}"

    - name: Display AI routing result
      ansible.builtin.debug:
        msg:
          - "========================================="
          - "  AI ROUTING DECISION"
          - "========================================="
          - "  Scenario:   {{ test_scenario }}"
          - "  Alert:      {{ alert.alert_text | truncate(80) }}"
          - "  Selected:   {{ routing_decision.template }}"
          - "  Confidence: {{ routing_decision.confidence }}%"
          - "  Reasoning:  {{ routing_decision.reasoning }}"
          - "========================================="
          - "  {{ 'WOULD LAUNCH: ' + routing_decision.template if routing_decision.template != 'ESCALATE' else 'WOULD ESCALATE to on-call team' }}"
          - "========================================="
