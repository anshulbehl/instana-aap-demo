---
# AWS defaults
aws_region: us-east-1
aws_instance_type: t3.medium
aws_vpc_cidr: 10.99.0.0/16
aws_subnet_cidr: 10.99.1.0/24
aws_resource_tags:
  Name: instana-demo
  purpose: instana-aap-demo

# Demo app
service_name: demo-app
service_port: 8080
health_check_path: /health

# Instana Host Agent REST API
instana_agent_api_url: "http://localhost:42699"
instana_event_endpoint: "{{ instana_agent_api_url }}/com.instana.plugin.generic.event"
